name: Build & push admin-web, deploy to EC2 (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      ECR_REPO: ${{ secrets.ECR_REPO_ADMIN_WEB_PROD }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push multi-arch image
        id: image
        run: |
          IMAGE_URI="${ECR_REPO}:${GITHUB_SHA}"

          docker buildx build \
            --no-cache \
            --platform linux/amd64,linux/arm64 \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL_PROD }}" \
            --build-arg NEXT_PUBLIC_PANEL_URL="${{ secrets.NEXT_PUBLIC_PANEL_URL_PROD }}" \
            --build-arg NEXT_PUBLIC_GATEWAY_ORIGIN="${{ secrets.NEXT_PUBLIC_GATEWAY_ORIGIN_PROD }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY_PROD }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_PROD }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID_PROD }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_PROD }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_PROD }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID_PROD }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_VAPID_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY_PROD }}" \
            -t "$IMAGE_URI" \
            -t "${ECR_REPO}:latest" \
            --push .

          REGISTRY=$(echo "$ECR_REPO" | cut -d'/' -f1)
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2 (docker compose pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            REGISTRY="${{ steps.image.outputs.registry }}"
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | sudo docker login --username AWS --password-stdin "$REGISTRY"
            cd /home/ec2-user/app
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker system prune -af --volumes || true
